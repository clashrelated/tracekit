<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 440px;
    height: 280px;
    overflow: hidden;
    font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
    background: #0E0E10;
  }

  .canvas {
    width: 440px;
    height: 280px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 18px;
    overflow: hidden;
  }

  /* background glow blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.35;
    pointer-events: none;
  }
  .blob-1 {
    width: 260px; height: 260px;
    background: #7C6DFA;
    top: -60px; left: -40px;
  }
  .blob-2 {
    width: 200px; height: 200px;
    background: #3B82F6;
    bottom: -60px; right: -20px;
    opacity: 0.2;
  }
  .blob-3 {
    width: 180px; height: 180px;
    background: #7C6DFA;
    bottom: -40px; left: 100px;
    opacity: 0.15;
  }

  /* subtle grid lines */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(124,109,250,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,109,250,0.06) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .icon-wrap {
    width: 52px;
    height: 52px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(124,109,250,0.3), 0 8px 24px rgba(0,0,0,0.5);
  }
  .icon-wrap img {
    width: 100%;
    height: 100%;
    display: block;
  }

  .brand {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .brand-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: #ECEEF3;
    line-height: 1;
  }
  .brand-pro {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #7C6DFA;
    background: rgba(124,109,250,0.14);
    border: 1px solid rgba(124,109,250,0.3);
    border-radius: 4px;
    padding: 2px 6px;
    align-self: flex-start;
    margin-top: 2px;
  }

  .tagline {
    font-size: 14px;
    color: #9AA0AC;
    text-align: center;
    line-height: 1.5;
    max-width: 320px;
    letter-spacing: 0.01em;
  }
  .tagline strong {
    color: #ECEEF3;
    font-weight: 500;
  }

  /* mini hop chain decoration */
  .chain {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }
  .hop {
    height: 24px;
    padding: 0 10px;
    border-radius: 6px;
    background: #1A1A1F;
    border: 1px solid #25252F;
    font-size: 11px;
    color: #9AA0AC;
    display: flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .hop .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .hop.start .dot { background: #7C6DFA; }
  .hop.mid .dot   { background: #F59E0B; }
  .hop.end .dot   { background: #22C55E; }
  .arrow {
    color: #5E6371;
    font-size: 12px;
  }
</style>
</head>
<body>
<div class="canvas">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="grid"></div>

  <div class="content">
    <div class="logo-row">
      <div class="icon-wrap">
        <img src="../icons/icon128.png" alt="TraceKit">
      </div>
      <div class="brand">
        <span class="brand-name">TraceKit</span>
        <span class="brand-pro">Pro</span>
      </div>
    </div>

    <div class="tagline">
      <strong>Expose every redirect.</strong> See where links really go —<br>
      tracking params, affiliate chains, and all.
    </div>

    <div class="chain">
      <div class="hop start"><span class="dot"></span>bit.ly/xyz</div>
      <span class="arrow">→</span>
      <div class="hop mid"><span class="dot"></span>tracker.io</div>
      <span class="arrow">→</span>
      <div class="hop end"><span class="dot"></span>shop.com</div>
    </div>
  </div>
</div>
</body>
</html>
